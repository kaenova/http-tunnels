name: Build and Release Go Binary

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps: 
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version-file: go.mod

      - name: Create dist directory
        run: mkdir -p dist

      - name: Build Darwin AMD64
        run: GOOS=darwin GOARCH=amd64 go build -o dist/http-tunnels-darwin-amd64 .

      - name: Build Darwin ARM64
        run: GOOS=darwin GOARCH=arm64 go build -o dist/http-tunnels-darwin-arm64 .

      - name: Build Linux AMD64
        run: GOOS=linux GOARCH=amd64 go build -o dist/http-tunnels-linux-amd64 .

      - name: Build Linux ARM64
        run: GOOS=linux GOARCH=arm64 go build -o dist/http-tunnels-linux-arm64 .

      - name: Build Windows AMD64
        run: GOOS=windows GOARCH=amd64 go build -o dist/http-tunnels-windows-amd64.exe .

      - name: Build Windows ARM64
        run: GOOS=windows GOARCH=arm64 go build -o dist/http-tunnels-windows-arm64.exe .

      - name: Compress binaries
        run: |
          tar -czvf dist/http-tunnels-darwin-amd64.tar.gz -C dist http-tunnels-darwin-amd64
          tar -czvf dist/http-tunnels-darwin-arm64.tar.gz -C dist http-tunnels-darwin-arm64
          tar -czvf dist/http-tunnels-linux-amd64.tar.gz -C dist http-tunnels-linux-amd64
          tar -czvf dist/http-tunnels-linux-arm64.tar.gz -C dist http-tunnels-linux-arm64
          zip -j dist/http-tunnels-windows-amd64.zip dist/http-tunnels-windows-amd64.exe
          zip -j dist/http-tunnels-windows-arm64.zip dist/http-tunnels-windows-arm64.exe

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: ${{ github.ref_name }}
          tag_name:  ${{ github.ref_name }}
          files: |
            dist/http-tunnels-darwin-amd64.tar.gz
            dist/http-tunnels-darwin-arm64.tar.gz
            dist/http-tunnels-linux-amd64.tar.gz
            dist/http-tunnels-linux-arm64.tar.gz
            dist/http-tunnels-windows-amd64.zip
            dist/http-tunnels-windows-arm64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}